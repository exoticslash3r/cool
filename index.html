<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的五张照片 · 极简相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c10;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
        }

        /* 主容器 - 干净简单 */
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 页头 */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            color: #f0f0f0;
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: -0.3px;
        }

        .header p {
            color: #8a8f99;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* 五张照片网格 - 响应式 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 22px;
            margin-bottom: 36px;
        }

        /* 每张卡片 */
        .photo-card {
            background: #14161a;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s;
            border: 1px solid #2a2e36;
        }

        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.5);
            border-color: #3a3f4a;
        }

        /* 图片区域 */
        .image-frame {
            aspect-ratio: 4 / 3;
            background: #1e2026;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .photo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .photo-card:hover .photo-img {
            transform: scale(1.02);
        }

        /* 占位符（仅当图片加载失败时显示） */
        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1c22;
            color: #7a7f8a;
            gap: 8px;
            text-align: center;
            padding: 16px;
        }

        .placeholder span:first-child {
            font-size: 2.5rem;
            opacity: 0.6;
        }

        .placeholder small {
            font-size: 0.7rem;
            word-break: break-all;
            color: #5f6470;
        }

        /* 底部标注 */
        .photo-label {
            padding: 12px;
            font-size: 0.75rem;
            color: #9ca3af;
            background: #0f1116;
            text-align: center;
            border-top: 1px solid #23272f;
            font-weight: 450;
            letter-spacing: 0.3px;
        }

        /* 提示条 */
        .info-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            background: #1a1e26;
            color: #8f9bb3;
            padding: 10px 20px;
            border-radius: 60px;
            display: inline-block;
            width: auto;
            backdrop-filter: blur(4px);
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.7rem;
            color: #4a4f5a;
            border-top: 1px solid #20232a;
            padding-top: 20px;
        }

        @media (max-width: 680px) {
            body {
                padding: 16px;
            }
            .photo-grid {
                gap: 14px;
            }
            .header h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📷 五张瞬间</h1>
        <p>你的托管照片 · 直接展示</p>
    </div>

    <!-- 5张照片网格 -->
    <div class="photo-grid" id="photoGrid"></div>

    <div style="text-align: center;">
        <div class="info-note">
            ⚡ 所有图片均来自你提供的链接 · 纯展示无多余代码
        </div>
    </div>
    <footer>
        简单相册 · 仅显示你给我的5张照片
    </footer>
</div>

<script>
    // ----- 你提供的5张图片直链 (最后一张.png我保留了，注意链接可能无法访问，但依然展示尝试)
    const imageUrls = [
        "https://i.postimg.cc/28GdBGQf/3010AFA8-C907-4A3D-B9F5-E551CFC5AAF4.jpg",
        "https://i.postimg.cc/qMwcCwsp/IMG-1129.jpg",
        "https://i.postimg.cc/gksy6sVp/IMG-1138.jpg",
        "https://i.postimg.cc/dt6RT62v/IMG-1153.jpg",
        "https://i.postimg.cc/dt6RT62q/IMG-1355.png"
    ];

    const photoGrid = document.getElementById('photoGrid');

    // 创建占位符（加载失败时显示）
    function createPlaceholder(photoNumber, failedUrl) {
        const div = document.createElement('div');
        div.className = 'placeholder';
        // 截断过长的url显示
        let displayUrl = failedUrl || '';
        if (displayUrl.length > 45) displayUrl = displayUrl.substring(0, 42) + '…';
        div.innerHTML = `
            <span>🖼️</span>
            <span>照片 ${photoNumber} 无法加载</span>
            <small>${displayUrl}</small>
        `;
        return div;
    }

    // 渲染全部照片
    function renderGallery() {
        photoGrid.innerHTML = '';
        
        imageUrls.forEach((url, index) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            const frame = document.createElement('div');
            frame.className = 'image-frame';
            
            const img = document.createElement('img');
            img.className = 'photo-img';
            img.alt = `Photo ${index + 1}`;
            img.src = url;
            
            // 图片加载失败时替换为占位符
            img.onerror = () => {
                // 避免重复替换
                if (frame.firstChild && frame.firstChild === img) {
                    const placeholder = createPlaceholder(index + 1, url);
                    frame.innerHTML = '';
                    frame.appendChild(placeholder);
                }
            };
            
            // 加载成功时确保没有占位符遗留
            img.onload = () => {
                // 什么也不用做，正常显示
            };
            
            frame.appendChild(img);
            
            const label = document.createElement('div');
            label.className = 'photo-label';
            label.textContent = `📸 照片 ${index + 1}`;
            
            card.appendChild(frame);
            card.appendChild(label);
            photoGrid.appendChild(card);
        });
    }

    // 页面启动渲染
    renderGallery();
</script>
</body>
</html>
